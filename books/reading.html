<!DOCTYPE html>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: serif;
}

body{
    background: linear-gradient(#000000, #1a0f0f);
    color:white;
}

/* NAVBAR */
.nav{
    text-align:center;
    padding:20px;
    background:black;
    color:#f5d58c;
    font-size:22px;
}

/* CONTAINER */
.container{
    padding:40px;
}

/* BOOKS GRID */
#books{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:25px;
}

/* BOOK CARD */
/* BOOK CARD */
.book{
    background:#141414;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(255,215,0,0.15);
    transition:0.5s;
    position:relative;
    height:340px;
    cursor:pointer;
}

/* HOVER CARD */
.book:hover{
    transform:translateY(-12px) scale(1.03);
    box-shadow:
    0 0 25px rgba(255,215,0,0.4),
    0 0 50px rgba(255,215,0,0.15);
}

/* IMAGE */
.book img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

/* TITLE ALWAYS VISIBLE */
.book h3{
    position:absolute;
    bottom:15px;
    left:15px;
    z-index:3;
    color:#fff;
    font-size:22px;
    text-shadow:0 0 10px black;
    transition:0.4s;
}

/* CONTENT */
.book-content{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.95),
        rgba(0,0,0,0.3)
    );
    display:flex;
    flex-direction:column;
    justify-content:end;
    padding:20px;
}

/* INFOS HIDDEN */
.book-content p,
.delete{
    opacity:0;
    transform:translateY(20px);
    transition:0.4s;
}

/* SHOW ON HOVER */
.book:hover .book-content p,
.book:hover .delete{
    opacity:1;
    transform:translateY(0);
}

/* IMAGE EFFECT */
.book:hover img{
    transform:scale(1.08);
    filter:brightness(0.45);
}

/* MOVE TITLE */
.book:hover h3{
    bottom:180px;
    color:#f5d58c;
}

/* TEXT */
.book p{
    font-size:13px;
    color:#ddd;
    margin:5px 0;
}

/* BUTTON */


#bt{
   width: 1150px;
   display: flex;
   justify-content: center; 
   align-items: center;
}

/* FORM */
.form-box{
    margin-top:60px;
    max-width:400px;
    background:#111;
    padding:20px;
    border-radius:10px;
}

.form-box h2{
    color:#f5d58c;
    margin-bottom:10px;
}
a{
    text-decoration: none;
    color: white;
}

.form-box input,
.form-box textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#222;
    border:none;
    color:white;
}

.form-box button{
    width:100%;
    padding:10px;
    background:#c49b3d;
    border:none;
    cursor:pointer;
}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px;
    position:absolute;
    width:100%;
    z-index:10;
}

.navbar ul{
    display:flex;
    gap:20px;
    list-style:none;
}
.ID{
    display: none;
}

/* FOOTER */

.footer{
    background: #0d0d0d;
    color: white;
    padding: 50px 10%;
    margin-top: 80px;
    border-top: 1px solid #333;
}

.footer-container{
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 40px;
}

.footer-logo h2{
    font-size: 32px;
    margin-bottom: 10px;
}

.footer-logo p{
    color: #aaa;
    width: 250px;
    line-height: 1.6;
}

.footer-links,
.footer-contact{
    display: flex;
    flex-direction: column;
}

.footer-links h3,
.footer-contact h3{
    margin-bottom: 15px;
    font-size: 20px;
}

.footer-links a{
    text-decoration: none;
    color: #aaa;
    margin-bottom: 10px;
    transition: 0.3s;
}

.footer-links a:hover{
    color: #fff;
    transform: translateX(5px);
}

.footer-contact p{
    color: #aaa;
    margin-bottom: 10px;
}

.footer-bottom{
    border-top: 1px solid #222;
    margin-top: 40px;
    padding-top: 20px;
    text-align: center;
    color: #777;
    font-size: 14px;
}

/* FILTER BAR */
.filter-box{
    display:flex;
    gap:15px;
    margin-bottom:30px;
    background:#111;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(255,215,0,0.08);
}

.filter-box select{
    padding:10px 15px;
    background:#1d1d1d;
    color:white;
    border:none;
    border-radius:8px;
    outline:none;
    cursor:pointer;
    transition:0.3s;
}

.filter-box select:hover{
    background:#2a2a2a;
}

</style>
