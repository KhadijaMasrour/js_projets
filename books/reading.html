<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Books</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: serif;
}

body{
    background: linear-gradient(#000000, #1a0f0f);
    color:white;
}

/* NAVBAR */
.nav{
    text-align:center;
    padding:20px;
    background:black;
    color:#f5d58c;
    font-size:22px;
}

/* CONTAINER */
.container{
    padding:40px;
}

/* BOOKS GRID */
#books{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:25px;
}

/* BOOK CARD */
/* BOOK CARD */
.book{
    background:#141414;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(255,215,0,0.15);
    transition:0.5s;
    position:relative;
    height:340px;
    cursor:pointer;
}

/* HOVER CARD */
.book:hover{
    transform:translateY(-12px) scale(1.03);
    box-shadow:
    0 0 25px rgba(255,215,0,0.4),
    0 0 50px rgba(255,215,0,0.15);
}

/* IMAGE */
.book img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

/* TITLE ALWAYS VISIBLE */
.book h3{
    position:absolute;
    bottom:15px;
    left:15px;
    z-index:3;
    color:#fff;
    font-size:22px;
    text-shadow:0 0 10px black;
    transition:0.4s;
}

/* CONTENT */
.book-content{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.95),
        rgba(0,0,0,0.3)
    );
    display:flex;
    flex-direction:column;
    justify-content:end;
    padding:20px;
}

/* INFOS HIDDEN */
.book-content p,
.delete{
    opacity:0;
    transform:translateY(20px);
    transition:0.4s;
}

/* SHOW ON HOVER */
.book:hover .book-content p,
.book:hover .delete{
    opacity:1;
    transform:translateY(0);
}

/* IMAGE EFFECT */
.book:hover img{
    transform:scale(1.08);
    filter:brightness(0.45);
}

/* MOVE TITLE */
.book:hover h3{
    bottom:180px;
    color:#f5d58c;
}

/* TEXT */
.book p{
    font-size:13px;
    color:#ddd;
    margin:5px 0;
}

/* BUTTON */


#bt{
   width: 1150px;
   display: flex;
   justify-content: center; 
   align-items: center;
}

/* FORM */
.form-box{
    margin-top:60px;
    max-width:400px;
    background:#111;
    padding:20px;
    border-radius:10px;
}

.form-box h2{
    color:#f5d58c;
    margin-bottom:10px;
}
a{
    text-decoration: none;
    color: white;
}

.form-box input,
.form-box textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#222;
    border:none;
    color:white;
}

.form-box button{
    width:100%;
    padding:10px;
    background:#c49b3d;
    border:none;
    cursor:pointer;
}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px;
    position:absolute;
    width:100%;
    z-index:10;
}

.navbar ul{
    display:flex;
    gap:20px;
    list-style:none;
}

</style>
</head>

<body>

    <header class="navbar">
    <h2 class="logo"> BookWorld</h2>
    <ul>
        <a href="bk.html"><li>Home</li></a>
        <a href="ajouter.html"><li>Ajouter</li></a>
        <a href="login.html"><li>Login</li></a>
    </ul>
</header>

<div class="nav"> Bibliothèque</div>

<div class="container">

<div id="books">
    <button id="bth">SHOW BOOKS</button>
</div>

</div>
<script src="reading.js"></script>

</body>
</html>
