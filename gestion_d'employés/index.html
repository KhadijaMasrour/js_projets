<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liste des emplyés</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Gestion des employés</h1>
      <h2>Formulaire d’ajout</h2>

      <form>
        <div class="form-row">

          <div class="field">
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom" placeholder="Entrer le nom" />
            <span id="errNom"></span> 
          </div>

          <div class="field">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" name="prenom" placeholder="Entrer le prénom" />
            <span class="errPrenom"></span>
          </div>

          <div class="field">
            <label for="poste">poste</label>
            <input type="text" id="poste" name="poste" placeholder="Entrer votre poste" />
            <span class="errPoste"></span>
          </div>

          <div class="field">
            <label for="txtsalaire">salaire</label>
            <input type="number" id="salaire" name="salaire" placeholder="Entrer le salaire" />
            <span class="errSalaire"></span>
          </div>
        </div>

        <div class="actions">
          <button type="button" id="btn_ajouter" class="btn btn-primary">Ajouter Employé</button>
          <button type="button" id="btn_modifier" class="btn btn-secondary">Modifier</button>
          <input type="number" id="id_mdf" placeholder="id" >
        </div>
      </form>
      
      
      
      <div class="table-wrapper">
        <table id="table_employés">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th>Prénom</th>
              <th>Poste</th>
              <th>Salaire</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tdata">

          </tbody>
          <tfoot>
            <tr>
              <td colspan="4"><strong>le salaire maximum</strong></td>
              <td>
                <strong id="txtSalaireMax">...</strong> <br />
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
  </div>
  <script src="Emp.js"></script>
</body>
</html>
